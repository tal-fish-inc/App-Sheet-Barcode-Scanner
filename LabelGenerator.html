  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    /* === HEADER BAR === */
    .app-header {
      background: #0f3460;
      padding: 12px 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1a4a7a;
    }
    .app-header svg { height: 28px; width: auto; }
    .app-header .nav-links { margin-left: auto; display: flex; gap: 1rem; }
    .app-header .nav-links a {
      color: #00d4aa;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .app-header .nav-links a:hover { text-decoration: underline; }

    /* === CONTROL PANEL === */
    .control-panel {
      background: #16213e;
      padding: 1.5rem;
      border-bottom: 2px solid #00d4aa;
    }
    .control-panel h1 {
      font-size: 1.4rem;
      color: #00d4aa;
      margin-bottom: 1rem;
    }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: end;
      margin-bottom: 1rem;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .control-group label {
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .control-group select,
    .control-group input {
      background: #0f3460;
      border: 1px solid #444;
      color: #eee;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      font-size: 1rem;
      min-width: 200px;
    }
    .control-group select:focus,
    .control-group input:focus {
      outline: none;
      border-color: #00d4aa;
    }

    .btn {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #00d4aa; color: #1a1a2e; }
    .btn-primary:hover { background: #00f5c4; }
    .btn-primary:disabled { background: #444; color: #888; cursor: not-allowed; }
    .btn-print { background: #e94560; color: white; }
    .btn-print:hover { background: #ff6b81; }

    .status-bar {
      background: #0f3460;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #aaa;
      margin-top: 0.5rem;
    }
    .status-bar.success { color: #00d4aa; border-left: 3px solid #00d4aa; }
    .status-bar.error { color: #e94560; border-left: 3px solid #e94560; }

    /* === LABEL PREVIEW === */
    .preview-area { padding: 1.5rem; }
    .preview-area h2 {
      font-size: 1.2rem;
      color: #aaa;
      margin-bottom: 1rem;
    }
    .label-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    /* === LABEL CARD === */
    .label-card {
      background: white;
      color: #111;
      border: 1.5px solid #222;
      border-radius: 6px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      page-break-inside: avoid;
    }
    .label-logo-img {
      height: 20px;
      width: auto;
      margin-bottom: 8px;
    }
    .label-item-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: #111;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .label-case-size {
      font-size: 0.72rem;
      color: #555;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .label-qr-img {
      width: 130px;
      height: 130px;
      margin-bottom: 6px;
    }
    .label-serial {
      font-size: 0.55rem;
      font-family: 'Courier New', monospace;
      color: #aaa;
      word-break: break-all;
    }

    /* === PRINT === */
    @media print {
      body { background: white; }
      .app-header, .control-panel, .preview-area h2, .no-print { display: none !important; }
      .preview-area { padding: 0; }
      .label-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
      }
      .label-card { border: 1px solid #888; border-radius: 3px; padding: 8px; }
      .label-logo-img { height: 14px; margin-bottom: 4px; }
      .label-item-name { font-size: 0.68rem; margin-bottom: 2px; }
      .label-case-size { font-size: 0.6rem; margin-bottom: 4px; }
      .label-qr-img { width: 100px; height: 100px; margin-bottom: 3px; }
      .label-serial { font-size: 0.45rem; }
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #444;
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="control-panel">
    <h1>QR Label Generator</h1>

    <div class="control-row">
      <div class="control-group">
        <label>Search SKU</label>
        <input type="text" id="sku-search" placeholder="Type to search..." oninput="filterSKUs()">
      </div>
      <div class="control-group">
        <label>SKU</label>
        <select id="sku-select" onchange="onSKUSelected()">
          <option value="">-- Select a SKU --</option>
        </select>
      </div>
      <div class="control-group">
        <label>Quantity</label>
        <input type="number" id="label-qty" value="10" min="1" max="5000" style="min-width:100px">
      </div>
      <button class="btn btn-primary" id="btn-generate" onclick="generateLabels()" disabled>
        Generate Labels
      </button>
      <button class="btn btn-print no-print" id="btn-print" onclick="window.print()" style="display:none">
        Print Labels
      </button>
    </div>

    <div class="control-row">
      <div class="control-group">
        <label>Filter by Brand</label>
        <select id="brand-filter" onchange="filterSKUs()">
          <option value="">All Brands</option>
        </select>
      </div>
      <div class="control-group">
        <label>Filter by Category</label>
        <select id="category-filter" onchange="filterSKUs()">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>

    <div id="status-bar" class="status-bar">Loading SKU data...</div>
  </div>

  <div class="preview-area">
    <h2 id="preview-title">Label Preview</h2>
    <div id="label-grid" class="label-grid"></div>
  </div>

  <script>
    var allSKUs = [];
    var filteredSKUs = [];

    // Black Headwaters logo as SVG data URI for label cards (print-friendly)
    var LOGO_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 56">' +
      '<path d="M0 2 L13 2 L13 35 L27 17 L41 35 L41 2 L54 2 L54 54 L41 54 L27 34 L13 54 L0 54 Z" fill="#000"/>' +
      '<path d="M76 8 L85 8 L85 27 L103 27 L103 8 L112 8 L112 50 L103 50 L103 36 L85 36 L85 50 L76 50 Z" fill="#000"/>' +
      '<path d="M124 8 L153 8 L153 16 L133 16 L133 25 L150 25 L150 33 L133 33 L133 42 L154 42 L154 50 L124 50 Z" fill="#000"/>' +
      '<path d="M161 50 L174 8 L189 8 L202 50 L192 50 L189 41 L174 41 L171 50 Z M177 33 L186 33 L181 16 Z" fill="#000"/>' +
      '<path d="M210 8 L230 8 Q245 8 245 29 Q245 50 230 50 L210 50 Z M219 16 L219 42 L228 42 Q236 42 236 29 Q236 16 228 16 Z" fill="#000"/>' +
      '<path d="M256 8 L265 8 L271 36 L279 8 L288 8 L296 36 L302 8 L311 8 L299 50 L290 50 L283 26 L276 50 L267 50 Z" fill="#000"/>' +
      '<path d="M317 50 L330 8 L345 8 L358 50 L348 50 L345 41 L330 41 L327 50 Z M333 33 L342 33 L337 16 Z" fill="#000"/>' +
      '<path d="M366 8 L398 8 L398 16 L387 16 L387 50 L377 50 L377 16 L366 16 Z" fill="#000"/>' +
      '<path d="M406 8 L435 8 L435 16 L415 16 L415 25 L432 25 L432 33 L415 33 L415 42 L436 42 L436 50 L406 50 Z" fill="#000"/>' +
      '<path d="M444 8 L468 8 Q477 8 477 20 Q477 29 470 31 L479 50 L469 50 L461 33 L453 33 L453 50 L444 50 Z M453 16 L453 26 L465 26 Q468 26 468 21 Q468 16 465 16 Z" fill="#000"/>' +
      '<path d="M487 8 L515 8 L515 16 L497 16 Q496 16 496 19 L496 22 Q496 25 498 25 L507 25 Q515 25 515 34 L515 42 Q515 50 507 50 L487 50 L487 42 L505 42 Q507 42 507 39 L507 36 Q507 34 505 34 L496 34 Q487 34 487 25 L487 17 Z" fill="#000"/>' +
      '</svg>';
    var logoDataURI = 'data:image/svg+xml;base64,' + btoa(LOGO_SVG);

    // QR code via API (no external JS needed — works in GAS sandbox)
    function qrImageUrl(data, size) {
      return 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&data=' + encodeURIComponent(data);
    }

    // Load SKUs
    google.script.run
      .withSuccessHandler(function(skus) {
        allSKUs = skus.filter(function(s) { return s.is_active !== false && s.is_active !== 'FALSE'; });
        filteredSKUs = allSKUs;
        populateFilters();
        populateSKUSelect(allSKUs);
        setStatus('success', allSKUs.length + ' active SKUs loaded.');
        document.getElementById('btn-generate').disabled = false;
      })
      .withFailureHandler(function(err) {
        setStatus('error', 'Failed to load SKUs: ' + err.message);
      })
      .getAllSKUs();

    function populateFilters() {
      var brands = [];
      var categories = [];
      var brandSet = {};
      var catSet = {};
      allSKUs.forEach(function(s) {
        var b = (s.sku_name || '').split('|')[0].trim();
        if (b && !brandSet[b]) { brandSet[b] = true; brands.push(b); }
        var c = s.category || '';
        if (c && !catSet[c]) { catSet[c] = true; categories.push(c); }
      });
      brands.sort();
      categories.sort();

      var brandSelect = document.getElementById('brand-filter');
      brands.forEach(function(b) {
        var opt = document.createElement('option');
        opt.value = b; opt.textContent = b;
        brandSelect.appendChild(opt);
      });

      var catSelect = document.getElementById('category-filter');
      categories.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        catSelect.appendChild(opt);
      });
    }

    function populateSKUSelect(skus) {
      var select = document.getElementById('sku-select');
      while (select.options.length > 1) select.remove(1);
      skus.forEach(function(sku) {
        var opt = document.createElement('option');
        opt.value = sku.sku_id;
        opt.textContent = sku.sku_id + ' — ' + (sku.sku_name || '').substring(0, 55);
        select.appendChild(opt);
      });
    }

    function filterSKUs() {
      var search = document.getElementById('sku-search').value.toLowerCase();
      var brand = document.getElementById('brand-filter').value;
      var category = document.getElementById('category-filter').value;

      filteredSKUs = allSKUs.filter(function(sku) {
        var skuBrand = (sku.sku_name || '').split('|')[0].trim();
        var matchSearch = !search ||
          sku.sku_id.toLowerCase().indexOf(search) >= 0 ||
          (sku.sku_name || '').toLowerCase().indexOf(search) >= 0;
        var matchBrand = !brand || skuBrand === brand;
        var matchCat = !category || sku.category === category;
        return matchSearch && matchBrand && matchCat;
      });

      populateSKUSelect(filteredSKUs);
      setStatus('success', filteredSKUs.length + ' SKUs matching filters');
    }

    function onSKUSelected() {
      var skuId = document.getElementById('sku-select').value;
      if (skuId) {
        var sku = allSKUs.find(function(s) { return s.sku_id === skuId; });
        if (sku) {
          var caseInfo = sku.units_per_case ? ' | Case: ' + sku.units_per_case + ' units' : ' | Case size: not yet set';
          setStatus('success', 'Selected: ' + sku.sku_name + caseInfo);
        }
      }
    }

    function generateLabels() {
      var skuId = document.getElementById('sku-select').value;
      var qty = parseInt(document.getElementById('label-qty').value) || 10;

      if (!skuId) { setStatus('error', 'Please select a SKU first'); return; }

      var sku = allSKUs.find(function(s) { return s.sku_id === skuId; });
      if (!sku) { setStatus('error', 'SKU not found'); return; }

      setStatus('', '<span class="spinner"></span>Generating ' + qty + ' unique labels...');
      document.getElementById('btn-generate').disabled = true;

      google.script.run
        .withSuccessHandler(function(serials) {
          renderLabels(sku, serials);
          document.getElementById('btn-generate').disabled = false;
          document.getElementById('btn-print').style.display = '';
          setStatus('success', serials.length + ' unique QR labels generated. Ready to print.');
        })
        .withFailureHandler(function(err) {
          document.getElementById('btn-generate').disabled = false;
          setStatus('error', 'Generation failed: ' + err.message);
        })
        .generateLabelSerials(skuId, qty);
    }

    function renderLabels(sku, serials) {
      var grid = document.getElementById('label-grid');
      grid.innerHTML = '';

      var caseSize = sku.units_per_case
        ? sku.units_per_case + ' units per case'
        : 'Case size: TBD';

      serials.forEach(function(serial) {
        var card = document.createElement('div');
        card.className = 'label-card';

        // 1. LOGO
        var logo = document.createElement('img');
        logo.className = 'label-logo-img';
        logo.src = logoDataURI;
        logo.alt = 'Headwaters';

        // 2. ITEM NAME
        var name = document.createElement('div');
        name.className = 'label-item-name';
        name.textContent = sku.sku_name || sku.sku_id;

        // 3. UNITS PER CASE
        var caseDiv = document.createElement('div');
        caseDiv.className = 'label-case-size';
        caseDiv.textContent = caseSize;

        // 4. QR CODE (via image API — no external JS needed)
        var qrImg = document.createElement('img');
        qrImg.className = 'label-qr-img';
        qrImg.src = qrImageUrl(serial.serialCode, 200);
        qrImg.alt = 'QR: ' + serial.serialCode;

        // 5. SERIAL
        var serialDiv = document.createElement('div');
        serialDiv.className = 'label-serial';
        serialDiv.textContent = serial.serialCode;

        card.appendChild(logo);
        card.appendChild(name);
        card.appendChild(caseDiv);
        card.appendChild(qrImg);
        card.appendChild(serialDiv);
        grid.appendChild(card);
      });

      document.getElementById('preview-title').textContent =
        'Label Preview — ' + serials.length + ' labels for ' + sku.sku_id;
    }

    function setStatus(type, message) {
      var bar = document.getElementById('status-bar');
      bar.className = 'status-bar' + (type ? ' ' + type : '');
      bar.innerHTML = message;
    }
  </script>

</body>
